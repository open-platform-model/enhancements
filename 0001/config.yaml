  - {date: "2026-05-25", event: "Experiment 08-catalog-fqn-regex concluded — hypothesis held. 8/8 positive accept (plain release, post-D23 0.1.0 tag, prerelease short/dotted, build metadata, multi-digit numerics, single-segment modulePath, deep multi-segment path), 9/9 negative reject (MAJOR-only @v1, bare @1, missing patch @1.0, four-part @1.0.0.4, no @version, empty modulePath @1.0.0, uppercase in path, trailing-dash @1.0.0-, v-prefix @v1.0.0). Notable finding: #CatalogFQNType does NOT structurally distinguish itself from #FQNType — a string like 'opmodel.dev/catalogs/opm/transformer@1.0.0' matches both regexes (4-segment path under #CatalogFQNType, path/name@version under #FQNType); the two types are semantically distinct via usage, not regex-disjoint. Documented in experiment README and negative/values.cue header comment so the implementer doesn't expect the regex itself to enforce the boundary. D19 Source line gained experiment citation."}
  - {date: "2026-05-25", event: "Experiment 09-catalog-mirror-pattern concluded — hypothesis held with three refinements (one discovered, two clarified during user review). Five variants explored: mirror (`_md: metadata` hidden-mirror), label_alias (`M=metadata: {...}` field-label alias — DISCOVERED as a second sound form during fixture authoring), alias (`metadata: M={...}` value alias — fails at vet with 'reference M not found'), direct (bare `metadata.modulePath` + public projection — vet errors at concrete-eval time), direct_hidden (bare `metadata.modulePath` + no public reader — plain `cue vet` AND `cue vet -c` BOTH pass silently; bug visible only via `cue eval --all` or kernel-time materialize). Mechanism corrected from 'shadowing' to closest-parent-field-walk: inside `metadata: { ... }`, a bare `metadata.X` reference walks up to the closest parent field named `metadata` — the inner field being constructed — and self-embeds into a non-concrete interpolation; user contributed the precise scoping explanation. Two sound forms (mirror + label_alias) are interchangeable; D19's mirror choice is stylistic. Operational implication: CI for `core/catalog.cue` cannot rely on `cue vet` alone — needs a kernel-time materialize test or a concrete-catalog fixture asserting on `cue eval --all` output. D19 Source line gained experiment citation."}
  - {date: "2026-05-25", event: "Experiment 10-catalog-stamping-asymmetry concluded — hypothesis held across seven variants. Transformer-side schema-enforced stamping caught loudly: transformer_ok_omitted (pattern stamps) vet 0; transformer_ok_canonical (author-literal matches stamp) vet 0; transformer_typo_subpath (`/trasnformers` typo) vet 1 with 'conflicting values' + file:line citations; transformer_wrong_version ('9.9.9' against id.Version) vet 1 with 'conflicting values'. Resource/trait/blueprint deliberate residual surface confirmed: resource_typo_subpath (`/resorces/workload` typo) vet 0 — typo ships in exported metadata.modulePath; trait_typo_subpath and blueprint_typo_subpath identical. D19 + D21 Source lines gained experiment citations. New risks added to 05-risks.md: (1) resource/trait/blueprint subpath typos ship silently — bounded (match-time MissingFQN would surface it) but diagnostic-distance is large; mitigations are additive follow-ups outside 0001's scope; (2) CI for `core/catalog.cue` cannot rely on `cue vet` alone to catch a bad `#Catalog.#transformers` pattern — needs a concrete-catalog fixture (tracked as a graduation-criterion follow-up for the core-schema-edit skill when 0001's core/ slice lands)."}
  - {date: "2026-05-25", event: "Experiment 11-cross-catalog-import concluded — hypothesis held. Two parallel cue.mod/ setups (per locked planning choice): both_subscribed/ holds catalog_a + catalog_b; b_missing/ holds catalog_a only. Both-catalogs-present: standard CUE import resolves; catalog_a's transformer materializes catalog_b's #BarResource into requiredResources keyed by B's concrete FQN test.example/b/resources/bar@1.0.0; vet clean (plain and -c). Catalog_b-absent: CUE evaluation fails with 'cannot find package' naming both the offending import line (foo_transformer.cue:12:2) and the file that triggered resolution (catalog.cue:9:2) — exactly the failure shape the kernel wraps as MaterializeError per 06-operational.md. Honest gap acknowledged in experiment README: pure CUE cannot express the platform subscription set without the kernel; physical absence is the closest proxy and produces a CUE error shape matching what the kernel would surface. D16 Source line gained experiment citation. Schema-side learning surfaced during fixture authoring: `#PrimitiveMetadata` needs `description?: string` directly (not added via intersection `& {description!: string}` in `#ComponentTransformer`) — the intersection approach fails 'field not allowed' for definition-wrapped transformer values; the production target.cue already uses the direct-field form, experiment schema now mirrors it."}
