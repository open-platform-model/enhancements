    semver: major
  - date: "2026-06-26"
    event: "Decision D12 added — generalizes the D11 old-name breadcrumb to every rename site across code, docs, and specs (CUE definitions, markdown, SPEC.md, OpenSpec spec.md deltas) and to every renamed definition regardless of visibility, at declaration/section granularity. Spec-change catalog drafted (9 spec changes: core×1 regular SPEC.md, library×1, opm-operator×3, cli×4, plus the enhancements-wording closing step)."
    semver: major
  - date: "2026-06-26"
