# Template config.yaml — id 0000 is reserved for this template.
#
# When creating a new enhancement, copy this directory to enhancements/NNNN/
# (next available four-digit id) and overwrite every value below.
#
# This file is itself a valid #EnhancementConfig — running
# `cue vet -d '#EnhancementConfig' enhancements/schema.cue enhancements/0000/config.yaml`
# passes. The "placeholder-ness" lives in the slug, title, and markdown bodies.

id: "0002"
slug: module-instance-rename
title: 'Rename the Release artifact family to Instance vocabulary (cross-cutting)'
status: accepted
# Which OPM area is the primary owner. See enhancements/schema.cue #Area.
area: core
# Every repo that ships code/schema/content changes driven by this enhancement.
# MUST include `area`. Validated against the workspace directory map in /CLAUDE.md.
affects:
  - core
  - library
  - opm-operator
  - cli
  - catalog
created: "2026-06-17"
updated: "2026-06-29"
authors:
  - emil@jacero.se
# Design-impact semver. A definition + CRD + wire rename is breaking for every
# consumer that names the old identifiers. Release mechanics (D13, revising D8):
# every affected artifact ships as a v1 prerelease (v1.0.0-alpha.N), including
# the opm-operator/CRD bundle; core advances opmodel.dev/core@v0 -> @v1.
semver: major
# Implementation tracking. status: not-started | in-progress | partial | complete.
# `date` and `notes` allowed only when status reaches `complete`.
implementation:
  status: in-progress
# Append-only timeline of milestones. The validator (future) enforces
# append-only via git diff against HEAD~1. Free-form `event` strings;
# `slice` + `semver` are optional structured fields for events that carry
# machine-readable detail.
