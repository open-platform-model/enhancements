  - date: "2026-06-22"
    event: "Scope expanded to cross-cutting (affects core, library, opm-operator, cli); D1 reversed by D2 — the GitOps Release CRD is renamed to ModulePackage; OQ1-OQ4 resolved by D3-D8; semver set to major"
    semver: major
  - date: "2026-06-22"
    event: "Accepted — design frozen, ready for per-repo slicing (core → library → opm-operator ‖ cli)"
    semver: major
  - date: "2026-06-26"
