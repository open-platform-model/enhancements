  - date: "2026-07-01"
    event: "Slice A1 implemented (Problem 3, widened) — opm-operator bumped k8s.io/* v0.35.2->v0.36.2, sigs.k8s.io/controller-runtime v0.23.3->v0.24.1, and the coupled Flux package set (cli-utils v1.2.2, pkg/apis/meta v1.30.1, pkg/runtime v0.110.1, pkg/ssa v0.76.1, source-controller/api v1.9.1) matching the flux2 v2.9.0 distribution's own pins (D4). Also migrated api/v1alpha1's scheme registration off the newly-deprecated controller-runtime/pkg/scheme.Builder to apimachinery's runtime.NewSchemeBuilder (D8, discovered via task dev:lint, behavior-preserving, 4 files). No go directive change needed; zero diff in generated CRDs/RBAC/dist/install.yaml except one benign import-alias line. Real e2e verification required a self-correction: design.md's first-drafted D7 wrongly claimed prune_test.go/finalizer_test.go provide live coverage (they are also pre-existing Skip() TODOs, not checked before that claim was written); the actual empirical proof came from PR #44's CI run, where podinfo_test.go executed for real (unlike the local run) and passed, confirming the bumped pkg/ssa apply path and cli-utils/pkg/kstatus/polling readiness detection. Merged to main as commit d724ac3 (PR #44, squash-merged). A5 (opm-kind-demo downstream audit) is now unblocked."
    slice: "opm-operator/2026-07-01-operator-bump-k8s-stable"
