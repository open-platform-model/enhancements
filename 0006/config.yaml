    slice: "cli/2026-07-01-cli-rename-module"
  - date: "2026-07-02"
    event: "D32-D35 — B2 (cli-operator-install-command) design firmed in an explore-mode session. D32 supersedes D28 (and OQ8's resolution): noun-first `opm operator` command group — `opm operator install [--crds-only]` / `opm operator uninstall`; no install/uninstall verb groups; D27's hint text respelled. D33: B2 ships install/uninstall only — the missing-CRD apply gate and D24's version-skew gates move to C1, where the CR write gives them a referent; B2 also renames the CLI's existing SSA field-manager constant `opm` -> `opm-cli` (D10's naming). D34: uninstall preserves the Namespace as well as CRDs, and refuses while ModuleInstances carry the operator's opmodel.dev/cleanup finalizer (warn naming each instance), overridable via --remove-finalizers (strips only the operator's finalizer; orphaning stated). D35: one embedded artifact — the pinned release's dist/install.yaml (first pin v1.0.0-alpha.2), CRDs derived by filtering, pin refreshed via a cli Taskfile sync task, --version fetching the GitHub release asset (checksum verification deferred), install waits for completion (CRDs Established + Deployment rollout; machinery reused by C3's readiness precondition). Also discovered and scheduled: D24's operator half (Platform.status.operatorVersion self-publish) was never assigned to any slice and the field exists nowhere in opm-operator — new slice A6 (operator-platform-status-operator-version) added to planned-changes.md; C1 now depends on it (absence would silently disable the skew ceiling as 'solo cluster'). planned-changes.md B2/C1 rescoped; 02-design.md, README.md, 05-risks.md, 06-operational.md command spellings updated."
  - date: "2026-07-03"
    event: "Slice B2 implemented (D5, D32-D35) — new `opm operator` command group in cli: `operator install [--crds-only] [--rbac [--user|--group]] [--version] [--timeout]` and `operator uninstall [--remove-finalizers]`. Single embedded artifact (pinned opm-operator v1.0.0-alpha.2 dist/install.yaml, go:embed) with plans derived by filtering (install all / CRDs-only subset / uninstall = all minus CRDs minus Namespace); `task operator:sync VERSION=<tag>` refresh task; `--version` fetches the GitHub release asset; bounded readiness waits (CRD Established + Deployment rollout, machinery reusable by C3's handoff precondition); uninstall finalizer guard (refuse naming instances armed with opmodel.dev/cleanup, --remove-finalizers strips only that finalizer, fails closed on list errors). CLI-wide SSA field manager renamed opm -> opm-cli (D33/D10). New cli main spec operator-lifecycle + cmd-structure delta. Commit 3387278, archived change, 14/14 tasks. C1 (cli-cr-inventory-backend) now waits only on A6 (Platform.status.operatorVersion)."
    slice: "cli/2026-07-03-cli-operator-install-command"
  - date: "2026-07-16"
    event: "D36-D37 + OQ17 — C1 (cli-cr-inventory-backend) planning session (explore mode). D36 amends D14 clause (1): the CLI's cuelang.org/go bump retargets v0.17.0-alpha.1 -> v0.17.1 (released 2026-07-16) and relocates from C2 into C1 — trial-verified (scratch-modfile build + full unit suite green, zero code changes); library/opm-operator pin bumps are user-owned outside 0006, with a hard precondition that both are on the same CUE line before C2's D30 parity experiment and C3 handoff (evaluator-version skew can produce divergent rendered bytes through a shared kernel). Caution recorded: v0.17.1 does NOT fix OPM's closedness manifestation (only upstream #4423 as filed) — the catalog_opm hoisted-guard workaround stays load-bearing. D37: cue.mod/local-module.cue (replaceWith, never-published, main-module-only, language floor v0.17.0 exactly) is the sanctioned local-module dev workflow; spec.module always carries the canonical declared path/version — the CR never represents a filesystem path in any mode; D6's source:local annotation demoted to OQ17 (advisory-only if kept, never a gate input; resolve at C1 drafting). planned-changes.md C1 scope refined: + CUE bump, + D6 write-side, spec.owner guard as a mode-resolution branch (D18 thin-editor + delete symmetry defer to C3), instanceUUID extracted from rendered labels (operator-parity mechanism); C2 sheds the CUE migration; A6 noted implemented-on-branch (unmerged/unreleased — C1's ceiling-gate e2e needs an operator release carrying it + a task operator:sync pin bump). 02-design/README/05-risks/06-operational CUE-target mentions updated; 05-risks alpha-prerelease risk inverted to evaluator-skew-until-separate-upgrades-land."
  - date: "2026-07-16"
    event: "D38 resolves OQ17 + C1 drafted. D38 (from the C1 fast-forward drafting session): the provenance annotation is kept and promoted to a fail-closed C3 handoff pre-gate — C1 stamps module-instance.opmodel.dev/source: local (conservative trigger: local main module or any local-path replaceWith), C3 refuses while present; and the investigation surfaced a real hole in D7.4 — the handoff verification render MUST bypass cue.mod/local-module.cue and resolve spec.module strictly from the registry (stale-cache-safe), else a local replacement makes the digest check self-consistent and meaningless. Annotation never grants (hand-stripping it changes nothing; the strict-registry digest gate stands behind it). C3's planned-changes description carries both requirements. C1 (cli-cr-inventory-backend) OpenSpec change drafted in cli/ via fast-forward: proposal + design (9 local decisions: CR store in internal/inventory, explicit CRD-wire-shape mapping, SSA spec + status-subresource writes, single ownership branch point, 6-gate battery order with dev-build ceiling skip, delete-after-success migration, provenance detection, native CR listing, CUE v0.17.1 bump) + 6 spec deltas (instance-inventory, inventory-ownership, inventory-listing, resource-discovery modified; apply-preflight-gates, secret-inventory-migration new) + 25 tasks. planned-changes C1 row -> drafted."
  - date: "2026-07-17"
    event: "Slice C1 (cli-cr-inventory-backend) implemented in cli/ — the inventory backend is rewired from the proprietary Secret to the ModuleInstance CR: shared GVR/constants + explicit CRD-wire-shape mapping (v/int64), an unstructured dynamic-client store (SSA spec + status-subresource writes, get/list/delete, instanceUUID matching), a single ResolveOwnership branch point (spec.owner cli|operator), the pre-apply gate battery (CRD presence, CRD field floor, operator-version ceiling via golang.org/x/mod/semver, moduleinstances/status SSAR) wired into apply in order and dry-run-exempt, delete-after-success Secret→CR migration, render-provenance detection (main module local for `opm module apply`, or any cue.mod/local-module.cue replaceWith for instance apply -> module-instance.opmodel.dev/source: local, else omitted so SSA removes it), the spec.module canonical reference (modulePath/nameSnakeCase@vMAJOR, never a filesystem path) + the spec.values unified blob threaded through the render Result, and the four status lastApplied* digests (source digest is a module-reference identity until kernel adoption). Secret backend (secret.go/crud.go/list.go) and pkg/ownership deleted; Secret unmarshal survives only in the migration path. Consumers rewired: apply/delete/status/list/diff/tree, kubernetes/delete.go (CR deleted last, no InventorySecretName), operator GVR consolidation, and kubernetes/status.go's operator-owned warning. Eight tests/integration programs rewired to the CR store (two new: migration, gates). go vet + unit tests + golangci-lint v2.11.3 all green; cuelang.org/go bumped to v0.17.1 (landed on main). Not yet archived: the e2e integration programs need a live kind cluster with the CRD installed, and the operator-version ceiling e2e stays blocked on the unreleased A6 operator (needs a release carrying Platform.status.operatorVersion + a `task operator:sync` pin bump). The archive-date slice ref is recorded at archive."
  - date: "2026-07-18"
    event: "Slice C1 (cli-cr-inventory-backend) archived — all 28 tasks complete, its 6 delta specs synced to cli main specs (apply-preflight-gates + secret-inventory-migration new; instance-inventory, inventory-listing, inventory-ownership, resource-discovery modified). A6 unblocked and consumed: it merged to opm-operator main (PR #47) and shipped in v1.0.0-alpha.3 / v1.0.0-alpha.4 (Platform CRD carries status.operatorVersion; PlatformReconciler stamps version.Full() on both exits), so C1 bumped its embedded operator pin v1.0.0-alpha.2 -> v1.0.0-alpha.4 (task operator:sync). Verified against a live kind-opm-dev cluster running the alpha.4 operator: the six rewired integration programs plus new migration/gates programs pass, and the operator-version ceiling e2e (Platform reconciled -> status.operatorVersion v1.0.0-alpha.4; older CLI refused, equal/newer pass, dev skips). go vet + unit tests (26 pkgs) + golangci-lint v2.11.3 all clean. Known gaps recorded in the change's VERIFICATION-NOTES.md (environment, not the slice): the real opm commands could not run end-to-end because ~/.opm/config.cue provider imports fail against the local registry, so the source:local provenance annotation write/SSA-removal and the full config-load->render->apply command flow have unit-level coverage only; the inst-tree testdata #ModuleInstance registry-resolution and module-apply are blocked by the same config/registry issue. planned-changes.md C1 row -> implemented; wave map A6/C1 -> done. Only C2 (kernel adoption, gated on 0001) and C3 (handoff) remain. (A6's own OpenSpec change is merged+released but not yet archived in the opm-operator repo.)"
    slice: "cli/2026-07-18-cli-cr-inventory-backend"

