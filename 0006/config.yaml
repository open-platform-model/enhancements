  - date: "2026-07-18"
    event: "D40 resolves the C2 relabel discovery (explore-mode session ahead of C3 drafting): handoff success redefined from byte-no-op to inventory-stable reconcile (Ready=True, inventory entry set unchanged, revision incremented, zero pruned — status reads only); the managed-by relabel (opm-cli -> opm-controller, stamped by core #TransformerContext.#runtimeName) is expected and reported, never a failure; no cross-actor digest comparison anywhere in the flow (D7.4 stays the CLI's pre-flip self-comparison). Blast radius verified label-only: catalog workload transformers use runtime-independent componentLabels for selectors/pod templates, so no rolling restarts and no selector-immutability violations — zero-downtime survives, zero-diff dropped. Amends D7.5; D7.1-7.4 stand. planned-changes C3 note updated; C3 drafting must verify the operator prune ownership guard tolerates still-opm-cli-labeled resources."
  - date: "2026-07-18"
    event: "Slice C3 (cli-instance-handoff) implemented in cli/ on branch feat/cli-instance-handoff — the last feature slice. New `opm instance handoff <name>` (D6 gate side, D7 as amended by D40, D16, D38 read side): precondition chain in cheapest-first order (cluster gates incl. D24 ceiling -> operator readiness via a new single-shot operator.CheckReady built on B2's predicates -> CR exists with spec.owner: cli -> D38 local-provenance annotation refusal -> strict-registry verification render -> D7.4 digest self-comparison), then a minimal single-field SSA flip (new inventory.PatchOwner; ApplySpec was unsuitable, it writes the full spec) and the D40 inventory-stable verdict (Ready=True for the flipped generation, entry set unchanged as a set via new inventory.DescribeEntrySetDrift, revision incremented), reporting the relabel as information. --force bypasses the digest gate only; --platform is declared-and-rejected (D11); no reverse mode (D16) and post-flip failures state that ownership is not reverted. Verification render isolation (D38): AcquireModuleFromRegistry (no CWD module discovery, so no local-module.cue replaceWith) under a fresh per-invocation CUE_CACHE_DIR, cluster Platform forced with a hard error on read failure (D17). D18 shipped in full: apply's operator-owned arm becomes the thin editor (new inventory.PatchSpecEdit writes spec.module+spec.values only, never spec.owner or the annotation — an SSA apply carrying an empty owner would seize the field), skipping render-apply/prune/status writes/status-SSAR while keeping the CRD+ceiling gates; delete's arm delegates to the operator's cleanup finalizer behind a readiness guard with no --force bypass (the B2 uninstall footgun, guarded from the other side). All three waits share one bounded reconcile-observation helper (LD1: inventory.WaitForReconcile/WaitForAbsence) reading the newly-parsed status.conditions + status.observedGeneration. D40 PRUNE-GUARD VERIFICATION RESOLVED — no operator gap, no follow-up slice: opm-operator's prune candidate set is inventory-derived (ComputeStaleSet over InventoryEntry identity, labels play no role in selection), and its ownership predicate core.IsOPMManagedBy accepts opm-cli, opm-controller AND the legacy value, so a still-opm-cli-labeled resource in the removed-but-not-yet-relabeled window is pruned normally rather than skipped or orphaned; the only additional guard (uuid label vs Status.InstanceUUID) is skipped when either side is empty and otherwise agrees by construction, since the operator adopts the CR whose status.instanceUUID the CLI wrote. Bug caught by live e2e and fixed during implementation: the new refusal paths were returning ExitError{Printed: true} without having printed, exiting silently. E2E coverage note: handoff gates 2-5 sit behind the operator-readiness gate by LD2's ordering, so their e2e skips without a running operator (image unpullable in the dev cluster); the adoption/thin-editor/digest-mismatch paths additionally need a live registry and are not yet covered end-to-end. Lint parity verified (zero new golangci-lint findings; the repo's 87 pre-existing goconst findings are unchanged and keep `task check` red independently of this slice)."
    slice: "cli/2026-07-18-cli-instance-handoff"

  - date: "2026-07-20"
    event: "C3 CORRECTION (found by the slice's own verification pass, before merge) — the D7/LD4 'minimal single-field SSA flip' was wrong and would have shipped a handoff that fails on every cluster. Under server-side apply a field manager's document is its COMPLETE declared intent: a field the manager previously owned but omits is released and pruned. opm-cli owns spec.owner + spec.module + spec.values from the preceding ApplySpec, so the minimal flip document released the other two. Proven against a live API server: `kubectl apply --server-side --field-manager=opm-cli` with only spec.owner returns `ModuleInstance is invalid: spec.module: Required value` (required field -> the whole patch is rejected, so handoff never succeeded), and the mirror case in thin-editor mode (module-only apply, which the ordinary Values==nil path produces) silently reduced a live CR from {owner, module, values} to {module} with exit 0 — spec.values AND the operator's spec.owner marker deleted, no error surfaced. FIX: inventory.PatchOwner and inventory.PatchSpecEdit deleted; ApplySpec is the single writer for the CLI-owned spec and now returns the resulting metadata.generation. The flip carries spec.owner: operator plus the record's CURRENT spec.module/spec.values; the thin editor carries the CURRENT spec.owner read from the live CR plus the new module/values. Restating an unchanged value is a no-op and does NOT bump metadata.generation (verified), so the reconcile-wait's generation semantics are unaffected. An empty owner is still omitted — the CRD reads absence as operator-managed, and writing \"\" would fail the enum. ROOT CAUSE of the miss: client-go's fake dynamic client does not implement apply-patch merge semantics, so the unit test asserted the minimal payload's SHAPE (assert.Len(spec, 1)) and passed against a bug a real API server rejects — the test pinned the defect. New live-cluster integration program tests/integration/ssa-ownership/main.go (wired into task test:integration) now covers flip-preserves-module+values, no-op-does-not-bump-generation, and thin-editor-preserves-owner. design.md LD4 and LD6 rewritten with the corrected reasoning and the empirical evidence; the instance-handoff spec requirement 'Ownership flip is a single SSA patch' (which was self-contradictory as written — a one-field SSA document from this manager necessarily changes other fields by deleting them) restated as 'Ownership flip changes only the owner' with a preserves-everything-else scenario and a no-op-generation scenario; inventory-ownership gained an explicit operator-ownership-survives-a-values-edit scenario. Also folded in: the pre-existing silent-exit bug at apply.go RunClusterGates/GateStatusRBAC (Printed: true set without printing, so missing-CRD and status-RBAC denials exited non-zero with no output at all). Lint is now one finding BELOW the pre-existing baseline (86 vs 87 goconst) since the duplicated writers are gone."
    slice: "cli/2026-07-18-cli-instance-handoff"

  - date: "2026-07-20"
    event: "C3 adoption path VERIFIED END-TO-END — tasks 5.2/5.3 closed, and two further cross-actor bugs found by running it. A reconciling operator now runs in kind-opm-dev via a new `task cluster:operator` (cli/Taskfile.yml): connect the opm-registry container to kind's docker network, `opm operator install`, patch the controller Deployment's args with `--registry=opmodel.dev=opm-registry:5000+insecure,testing.opmodel.dev=...` (the operator's registry is a FLAG — OPM_REGISTRY is only read when the flag is empty and it defaults to GHCR, and the operator overwrites CUE_REGISTRY in its own env, so pod env vars do nothing), apply the cluster Platform singleton (hack/kind-platform.yaml, ranges mirroring the CLI's DefaultPlatformTemplate so both actors materialize the same catalogs), and wait for status.operatorVersion. Blueprint was opm-operator's own .tasks/kind.yaml, not opm-kind-demo (whose operator uses public GHCR and whose local registry only holds a Flux bundle). Supporting files: hack/opm-config.cue (hermetic dev config via --config, so the tooling does not depend on a developer's ~/.opm), hack/kind-operator-rbac.yaml (DEV-ONLY: the shipped manager role grants the operator NO workload permissions — by design it impersonates a per-instance ServiceAccount named in spec.serviceAccountName, a field the CLI does not write, so a CLI-created instance has no applier identity and every operator apply 403s), and the first renderable instance fixture in cli/ (tests/e2e/testdata/handoff/, core@v1 + podinfo@v0 v0.1.3). RETRACTION: the earlier claim that the pinned operator image was unpullable was never verified and was wrong — the image was already in the kind node; only `--crds-only` had ever been run, so the controller Deployment simply never existed. BUG 1 (cross-actor contract, C1 origin): pkg/module CanonicalModuleRef returned a BARE semver ('0.1.3') for spec.module.version, but the operator passes that field straight to the registry loader with no normalization and CUE rejects a bare version as malformed — so EVERY CLI-written ModuleInstance was unresolvable by the operator, defeating the shared-CR premise. The operator's own CRD documents the v-prefixed form ('Example: \"v0.2.1\"') and its podinfo fixture uses v0.1.2. Fixed to emit 'v0.1.3'; majorVersionTag also hardened against a v-prefixed input (it produced 'vv0'), caught by the idempotency case added alongside. BUG 2 (C3 origin, honesty): operator-owned delete reported 'operator pruned N resources' after merely observing the CR disappear. spec.prune has no CRD default and the CLI never writes it, so the operator logs 'Prune disabled, orphaning managed resources on deletion' and leaves every workload running — the CLI was reporting a cleanup that provably had not happened. Record now carries spec.prune and delete reports the actual outcome, naming the kubectl patch that enables pruning. Both delete outcomes are e2e-covered. VERIFIED LIVE: handoff adoption (verification render matches, 2 resources adopted, Ready=True, inventory entry set unchanged, revision incremented, POD UIDs IDENTICAL before/after, managed-by relabelled opm-cli -> opm-controller — D40's 'relabel only, no workload changes' is now an observation, not a design claim); digest mismatch aborts showing both digests with ownership untouched, and --force overrides exactly that gate; thin-editor values round-trip (spec.values updated, spec.owner preserved, operator scaled the Deployment); operator-owned delete in both prune modes; all four precondition refusals. e2e gating is hard-fail (not skip) per user decision, with the destructive operator-lifecycle test now rebuilding the dev operator in a LIFO t.Cleanup so a full suite run stays re-runnable — proven by two consecutive green full runs (~160s each). Lint sits at 86, one below the pre-existing 87 baseline."
    slice: "cli/2026-07-18-cli-instance-handoff"

  - date: "2026-07-20"
    event: "Slice C3 (cli-instance-handoff) ARCHIVED — the last feature slice of 0006 closes. A pre-archive verification pass found a third defect, on top of the two the live run caught: LD4a, the flip's stale-snapshot race. Gates 4-5 download and render a module and spec.owner is still `cli` throughout, so a concurrent `opm instance apply` can legitimately move spec.module/spec.values inside the verification window; because opm-cli is the sole SSA writer for those fields and applies with Force, a flip built from the pre-verification record restated the STALE values and silently reverted the concurrent apply while handing ownership away — and the D40 verdict could not detect it, since its baseline was that same stale snapshot. Silent state loss reported as a clean handoff, on a path D16 gives no reverse mode. FIX: re-read the record immediately before the flip, abort when metadata.generation moved (the API server bumps it on spec changes only — exactly the writes that invalidate the verification), and take the D40 baseline from the re-read. It refuses rather than repairs: adopting the fresher spec would flip a document D7.4 never verified, defeating the gate it just passed. Residual window documented and accepted — detect-and-retry, not atomicity, which would need an SSA resourceVersion precondition the inventory store expresses for no writer today. Recorded as design.md LD4a plus a matching spec scenario. Also fixed in the pass: a stale `opm instance status` warning still claiming the CLI 'cannot mutate' an operator-managed instance (false since D18); `opm instance apply --dry-run` resolving to CLI-executor mode against operator-owned instances and previewing resource applies the CLI would never perform (LoadPreviousInventory returns nil on dry-run, so the resolver saw no CR) — now probes ownership and previews the thin edit, running the same local-bytes refusal; and `--timeout 0` meaning an already-expired deadline on handoff but the 5m default on apply, normalized centrally in inventory.ResolveTimeout so no wait call site can forget. planned-changes.md's C3 description was ALSO corrected here: it still described inventory.PatchOwner and inventory.PatchSpecEdit as shipped, though both were deleted by the 2026-07-20 C3 CORRECTION — original wording preserved in a quote block rather than silently overwritten. RE-VERIFIED rather than trusting the 2026-07-18 green, since LD4a, the dry-run probe, the thin-editor resolveThinEditRef extraction and ResolveTimeout all touch the covered paths: full task test:e2e green in 163s against the live kind operator (TestE2E_Handoff_Adoption re-run standalone to confirm, the first log having been tail-truncated), task test:integration green including ssa-ownership and render-parity, unit suite green, lint 86 — one BELOW the pre-existing 87-finding goconst baseline that keeps task check red independently of this slice. Archived as cli/openspec/changes/archive/2026-07-20-cli-instance-handoff/ with its 2 delta specs synced to main (instance-handoff new, 5 requirements; inventory-ownership 4 -> 5, adding thin-editor apply and finalizer-delegating delete, modifying the mode-resolution branch point, and removing C1's now-obsolete 'operator-owned instances are refused' requirement). Three commits on feat/cli-instance-handoff: 00fe7ef fix(module) (the bare-semver bug, split out as independently revertable and verified to build and test standalone), 29a183d feat(instance), a9c0e64 chore(openspec). With C3 done, every FEATURE slice in 0006 has shipped; implementation.status stays in-progress because A5 (downstream opm-kind-demo audit) remains planned — it gates nothing else here."
