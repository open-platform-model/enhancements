    event: "C2 merged and released — cli#112 (squash 2ba7c40, conventional feat! title; the new pr-title guard rode along) merged to main; release-please cut cli 1.0.0-alpha.2 (#113). Post-verify hardening included in the merge: code-review fixes (config import guard, seeding-hook error surfacing), orphan removal with 7 spec-retirement deltas, PlatformSpec threaded through Result (no seed-time re-read), and the render-bearing integration fixtures rewritten to core@v1 (module-apply + inst-tree, both green against kind — the fixture rewrite discovery: a module's declared cue.mod path AND root package name must both follow nameSnakeCase for kernel synthesis to resolve the self-import locally). Companion opm-operator#51 (podinfo fixture 0.1.3) merged; catalogs/opm v1.0.0-alpha.2 + podinfo v0.1.3 published to the local registry as new versions (immutable-tag lesson). Remaining 0006 work: C3 (cli-instance-handoff, carrying the managed-by-relabel finding) and A5 (demo audit)."
