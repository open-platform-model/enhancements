# Append-only timeline of milestones.
history:
  - date: "2026-06-22"
    event: "Drafted — seeded from cli/docs/rfc/0007 (CR inventory + operator handoff); extended with full library-kernel adoption (D9) and CLI-side SSA apply (D10)"
  - date: "2026-06-22"
    event: "OQ1 resolved by D11 (platform source precedence; handoff forces the cluster Platform CR) + D12 (Platform has no owner marker; CLI writes un-owned cluster Platform write-if-absent in solo mode)"
  - date: "2026-06-22"
    event: "Dependency analysis (research/findings.md): OQ2 resolved by D13 (CLI imports library only, no controller-runtime/Flux; inventory logic homes in library; CR via unstructured); D14 accepts no-compat refactor + CUE v0.17-alpha bump; library added to affects; note to bump operator k8s+controller-runtime to CLI's latest-stable line"
  - date: "2026-06-22"
    event: "Review pass (user direction): D15 rename CLI module github.com/opmodel/cli -> github.com/open-platform-model/cli; D16 reverse handoff (--to cli) out of scope (supersedes D7 reverse-mode portion); D17 both local + cluster Platform first-class, OPM never requires cluster-admin on non-handoff paths (reinforces D11/D12). Added OQ10 (spec.values capture / render parity — deeper research, load-bearing for accepted), OQ11 (status.conditions SSA ownership in handoff window), OQ12 (release diff platform source — investigate to a decision), OQ13 (write-if-absent atomicity), OQ14 (platform-source flag surface across commands)"
  - date: "2026-06-23"
    event: "D18 (post-handoff dual-mode: CLI may edit an operator-owned CR's spec but defers render/apply/prune/status to the operator; refines D3's EnsureCLIMutable to gate direct resource apply, not spec edits) + D19 resolves OQ10 (spec.values is the sole authoritative render input — CLI unifies all value inputs into it and renders its own apply from it; trusted via diff/dry-run + D7.4 backstop; forward-guard for any future non-value-file render input e.g. RFC-0005 env wiring). OQ10 closed; read-side symmetry was never the risk."
  - date: "2026-06-29"
    event: "planned-changes.md C2 (cli-kernel-adoption) gains a 0002 carryover note: the synthesis path cli/pkg/loader/synth.go (loadSynthWrapper) still applies #ModuleRelease (deferred catalog-pin from 0002 X1) and is the sole remaining production-code #ModuleRelease reference in cli/ after the 0002 sweep; C2 must retire it to #ModuleInstance and resolve the …/modulerelease@v1 import-path drift. Bidirectional link with 0002 (already related)."
  - date: "2026-06-30"
    event: "D30 — the OQ1 render-digest parity experiment (CLI and operator producing equal render digests for the same release against the same Platform spec) is deferred into the C2 kernel-adoption slice, since it is only measurable once the CLI renders through the library kernel (D9); recorded in 04-graduation as an accepted→implemented gate on C2. Closes the last draft→accepted gate item."
  - date: "2026-06-30"
    event: "Accepted — design frozen; all 14 OQs resolved (D11–D30); task vet:one + task check clean. semver: none (no core schema change; the operator ModuleInstance CRD gains an additive spec.owner within v1alpha1). Ready for slicing per planned-changes.md (Wave 0: A1–A4)."
    semver: none
  - date: "2026-06-30"
    event: "Slice A3 implemented (D13) — new library/opm/inventory package shipped: runtime-neutral InventoryEntry, identity relations, ComputeDigest, ComputeStaleSet on a canonical K8sIdentityEqual base (reconciles prior CLI/operator drift), plus pure prune-safety (ApplyComponentRenameSafetyCheck + pre-apply collision predicate, D26). No controller-runtime/Flux (import-graph guard test); adds k8s.io/apimachinery. New main spec library/openspec/specs/inventory/spec.md. Unblocks B1 (operator) and C1 (CLI). implementation.status -> in-progress"
    slice: "library/2026-06-30-library-inventory-pkg"
  - date: "2026-06-30"
    event: "Slice A4 implemented (D3) — opm-operator ModuleInstance gains the typed spec.owner enum (cli|operator, optional, no CRD default; reconciler carries the operator-managed default). Owner-skip gate added before finalizer registration: CLI-owned instances get no opmodel.dev/cleanup finalizer, no render/apply/prune/deletion-cleanup, and one idempotent Ready: Unknown/ManagedExternally acknowledgement (new status.ManagedExternallyReason + MarkManagedExternally) that writes no observedGeneration and no CLI-owned status (inventory, lastApplied*, instanceUUID); delete is a no-op; cli->operator flip falls through to a normal reconcile (handoff). Regenerated CRD/DeepCopy/dist/install.yaml; new main spec opm-operator/openspec/specs/module-instance-ownership/spec.md (4 requirements). Produces the CRD B2 embeds and C1 reads/writes; unblocks B2."
    slice: "opm-operator/2026-06-30-operator-moduleinstance-owner-marker"
  - date: "2026-07-01"
    event: "D31 — reverted the shared library/opm/inventory package (slice A3): tracing which inventory functions are actually cross-actor-critical showed only the InventoryEntry wire shape qualifies (already anchored by the CRD schema + D9's kernel-render-parity, not by package-sharing); ComputeStaleSet/ComputeDigest/ApplyComponentRenameSafetyCheck/CollidesOnApply are each local per-actor policy, never cross-compared — the one moment a cross-actor comparison would matter (operator's first post-handoff stale-set read of CLI-written entries) is already gated by D7.4's render-digest check. Supersedes D13's shared-logic clause and D26 in full. Discovered in the process: cli/pkg/inventory.ComputeStaleSet (component-aware IdentityEqual) and opm-operator/internal/inventory.ComputeStaleSet (component-agnostic K8sIdentityEqual) already diverge (OQ15, open); the operator's apply path has no equivalent of the CLI's PreApplyExistenceCheck foreign/terminating-object guard despite both apply paths forcing SSA field-ownership unconditionally (OQ16, open; new risk entry in 05-risks.md). planned-changes.md A3 marked reverted-pending (code revert of library/opm/inventory deferred to a separate session, not done here); B1 (operator-adopt-library-inventory) cancelled — its premise no longer applies; C1's dependency on A3/B1 dropped. 02-design.md, 05-risks.md, 06-operational.md, README.md, 04-graduation.md updated to remove the reverted shared-package framing. implementation.status remains in-progress."
  - date: "2026-07-01"
    event: "A3 code revert landed — opm/inventory deleted from library in full via OpenSpec change revert-library-inventory-pkg (archived library/openspec/changes/archive/2026-07-01-revert-library-inventory-pkg/), commit 738a694 (PR #36, merged). go.mod/go.sum cleanly reverted (dropped k8s.io/apimachinery + its transitive closure); library/MIGRATIONS.md carries the BREAKING entry (revert-library-inventory-pkg). planned-changes.md A3 row updated reverted-pending -> reverted. Closes out D31's deferred code-revert action."
    slice: "library/2026-07-01-revert-library-inventory-pkg"
