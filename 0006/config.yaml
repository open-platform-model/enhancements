  - date: "2026-06-30"
    event: "Slice A3 implemented (D13) — new library/opm/inventory package shipped: runtime-neutral InventoryEntry, identity relations, ComputeDigest, ComputeStaleSet on a canonical K8sIdentityEqual base (reconciles prior CLI/operator drift), plus pure prune-safety (ApplyComponentRenameSafetyCheck + pre-apply collision predicate, D26). No controller-runtime/Flux (import-graph guard test); adds k8s.io/apimachinery. New main spec library/openspec/specs/inventory/spec.md. Unblocks B1 (operator) and C1 (CLI). implementation.status -> in-progress"
