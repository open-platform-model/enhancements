    event: "Slice C2 (cli-kernel-adoption) implemented in cli/ on branch feat/cli-kernel-adoption (4 phase commits, unmerged) — the CLI renders through the library kernel end-to-end. Phase A (D39): ~/.opm reduced to two import-free data files (config.cue scalar-only with migration-hint errors; data-only CR-spec-shaped platform.cue seeding both official catalogs at prerelease-tolerant ranges), single-pass config load, cue.mod/tidy retired. Phase B: internal/platform with the D21 precedence + provenance, D22 create-only write-if-absent, SynthesizePlatform→Materialize on a per-invocation kernel; library v1.0.0-alpha.7 dep added (kernel only, D13 clean); seeded default platform materialized green against the local registry. Phase C (D9 + 0002 carryover): pkg/render/pkg/provider/synth-wrapper/instancefile deleted, workflow render rewired onto LoadInstancePackage/LoadModulePackage+SynthesizeInstance (local dirs staged as the build's main module — D37-compatible)+Compile with runtime opm-cli, values validate before platform I/O, --provider removed, kind ModuleInstance emitted (last #ModuleRelease reference gone); kernel reproduces the CLI's grouped validation-error format byte-identically. Phase D: lastAppliedRenderDigest adopts the operator's exact algorithm/serialization (ComputeRenderDigest over CUE-value JSON); D36's sourceDigest premise corrected — the operator's CUE-native path uses the same reference-identity ModuleSourceDigest, so C1's computation was already parity; D30 parity check (tests/integration/render-parity) PASSES byte-identical across local-staging vs registry-acquisition; full live kind verification (CRD install, fallback apply, Platform seeding, precedence flip, --platform override, delete). DISCOVERIES for C3: (1) the runtime identity is stamped into rendered labels (managed-by: opm-cli vs opm-controller), so the operator's first post-handoff reconcile will relabel — the D7 no-op expectation (0 changed) cannot hold as written; (2) old-model integration fixtures need new-model rewrites pre-archive; (3) library/testdata/modules/web_app violates the nameSnakeCase path convention (kebab leaf) and cannot synthesize. cue-binary-integration change flagged for withdrawal (its cue-mod-tidy motivation is deleted). planned-changes C2 -> implemented (branch)."
    slice: "cli/2026-07-18-cli-kernel-adoption"

